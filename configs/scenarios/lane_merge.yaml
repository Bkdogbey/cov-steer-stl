# Lane Merge
#
# Road layout (x is forward / longitudinal, y is lateral):
#
#   Left lane:  y ∈ [2.0, 4.0]
#   Divider:    y = 2.0  (dashed lane marking, visual only)
#   Right lane: y ∈ [0.0, 2.0]
#
# Obstacles:
#   Lead vehicle (right lane, blocking):      x ∈ [2.5, 5.5],  y ∈ [0.1, 1.9]
#   Left-lane traffic ahead of gap:           x ∈ [4.0, 8.0],  y ∈ [2.1, 3.9]
#   Left-lane traffic behind gap (tailgater): x ∈ [-2.0, 1.5], y ∈ [2.1, 3.9]
#
# Merge gap: x ∈ [1.5, 4.0] in the left lane (between flanking traffic)
#
# Expected behavior:
#   Open-loop:   lateral covariance grows → probabilistic tails clip
#                the obstacle predicates at the merge gap → low P(phi)
#   Cov-steering: K_t shrinks σ_y near the gap → high P(phi)

label: "Lane Merge"
dynamics: configs/dynamics/double_integrator.yaml

horizon: 50
animate: false

initial_state:
  mean: [-3.0, 1.0, 1.5, 0.0]         # px, py, vx, vy — right lane center, moving forward
  cov_diag: [0.1, 0.1, 0.05, 0.05]    # ~0.32 m initial position uncertainty

goal:
  x_range: [8.0, 12.0]
  y_range: [2.2, 3.8]    # left lane, past the merge gap

bounds:
  x_range: [-5.0, 14.0]
  y_range: [-0.2, 4.2]

obstacles:
  # Lead vehicle — blocks right lane, forces merge
  - type: rectangle
    x_range: [2.5, 5.5]
    y_range: [0.1, 1.9]
  # Left lane: traffic ahead of the gap
  - type: rectangle
    x_range: [4.0, 8.0]
    y_range: [2.1, 3.9]
  # Left lane: traffic behind the gap (tailgater)
  - type: rectangle
    x_range: [-2.0, 1.5]
    y_range: [2.1, 3.9]

lane_markings:
  - y_pos: 2.0
    x_range: [-5.0, 14.0]
    style: dashed

planner:
  type: single_shot
  n_starts: 3

optimizer:
  max_iters: 1200
  lr_v: 0.05
  lr_k: 0.01

weights:
  w_phi: 28.0
  w_trace_terminal: 0.3
  w_dist: 0.2
  w_K: 0.01
  w_du: 0.3
  w_repulsion: 8.0
  obs_margin: 0.15

open_loop:
  weights:
    w_repulsion: 6.0
    obs_margin: 0.25

closed_loop:
  weights:
    w_repulsion: 10.0
    obs_margin: 0.15
    cov_margin_scale: 1.5
    w_K: 0.01
