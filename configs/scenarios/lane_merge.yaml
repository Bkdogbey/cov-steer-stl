# Lane Merge (overtake a slower vehicle)
#
# Road layout (x is forward / longitudinal, y is lateral):
#
#   Left lane:  y ∈ [2.0, 4.0]   ← target lane
#   Divider:    y = 2.0  (dashed)
#   Right lane: y ∈ [0.0, 2.0]   ← ego starts here
#
# Scenario:
#   A slow vehicle (vx = 0.3 m/s) occupies the left lane ahead of the ego.
#   The ego (vx = 1.5 m/s) must merge left and overtake it.
#
# STL structure:
#   Eventually(goal) ∧ Always(avoid obstacle) ∧ Always(in bounds)
#
#   The obstacle fills y ∈ [2.2, 3.8] — identical to the goal y-range —
#   so Eventually(goal) can only be satisfied at a timestep where the ego
#   has already passed the obstacle in x.  This forces the overtaking behaviour.
#
# Expected behaviour:
#   Open-loop:   lateral covariance grows during the merge → probabilistic
#                tail clips the obstacle predicate → lower P(phi)
#   Cov-steering: K_t squeezes σ_y during the overtake → higher P(phi)

label: "Lane Merge"
dynamics: configs/dynamics/double_integrator.yaml

horizon: 50
animate: false

initial_state:
  mean: [-3.0, 1.0, 1.5, 0.0]       # px, py, vx, vy — right lane, moving forward
  cov_diag: [0.1, 0.1, 0.05, 0.05]  # ~0.32 m initial position uncertainty

goal:
  x_range: [-5.0, 14.0]   # broad — goal is met once ego is in left lane past obstacle
  y_range: [2.2, 3.8]     # left lane centre (same y-extent as obstacle, see above)

bounds:
  x_range: [-5.0, 14.0]
  y_range: [-0.2, 4.2]

obstacles:
  # Slow vehicle ahead in left lane — ego must merge and pass
  - type: moving_rectangle
    x0: 3.0          # initial centre x
    speed_x: 0.3     # longitudinal speed [m/s]
    y: 3.0           # fixed lateral centre (left lane)
    width: 2.5       # longitudinal footprint
    height: 1.6      # lateral footprint → spans y ∈ [2.2, 3.8]

lane_markings:
  - y_pos: 2.0
    x_range: [-5.0, 14.0]
    style: dashed
  - y_pos: 0.0
    x_range: [-5.0, 14.0]
    style: solid
  - y_pos: 4.0
    x_range: [-5.0, 14.0]
    style: solid

planner:
  type: single_shot
  n_starts: 3

optimizer:
  max_iters: 1200
  lr_v: 0.05
  lr_k: 0.01

weights:
  w_phi: 28.0
  w_trace_terminal: 0.3
  w_dist: 0.2
  w_K: 0.01
  w_du: 0.3
  w_repulsion: 8.0
  obs_margin: 0.15

open_loop:
  weights:
    w_repulsion: 6.0
    obs_margin: 0.25

closed_loop:
  weights:
    w_repulsion: 10.0
    obs_margin: 0.15
    cov_margin_scale: 1.5
    w_K: 0.01
