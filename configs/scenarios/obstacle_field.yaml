label: "Obstacle Field"
dynamics: configs/dynamics/single_integrator.yaml

horizon: 250

initial_state:
  mean: [0.0, 5.0]
  cov_diag: [0.0001, 0.0001]

goal:
  x_range: [11.0, 12.0]
  y_range: [3.0, 4.0]

bounds:
  x_range: [-1.0, 13.0]
  y_range: [-1.0, 11.0]

visit_regions:
  - x_range: [5.0, 7.0]
    y_range: [7.0, 9.0]

obstacles:
  - type: rectangle
    x_range: [4.0, 8.0]
    y_range: [0.0, 2.0]

  - type: rectangle
    x_range: [1.0, 3.0]
    y_range: [3.0, 11.0]

  - type: circle
    center: [6.0, 4.0]
    radius: 1.6

planner:
  type: single_shot
  steering: closed_loop

weights:
  w_repulsion: 1.0  
  obs_margin: 3
#Look for added weights and increased margin for obstacle repulsion, to handle the more complex environment.

