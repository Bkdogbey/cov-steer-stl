label: "Obstacle Field"
dynamics: configs/dynamics/single_integrator.yaml

horizon: 130

initial_state:
  mean: [0.0, 5.0]
  cov_diag: [0.001, 0.001]

goal:
  x_range: [11.0, 12.0]
  y_range: [6.0, 7.0]

bounds:
  x_range: [-1.0, 13.0]
  y_range: [-1.0, 11.0]


obstacles:
  - type: rectangle
    x_range: [2, 4]
    y_range: [4.0, 10.0]
  - type: rectangle
    x_range: [7.0, 9.0]
    y_range: [0.0, 4.0]
  - type: rectangle
    x_range: [7.0, 9.0]
    y_range: [5.0, 8.0]


planner:
  type: single_shot
  steering: closed_loop
  #mpc:
    #horizon: 10
    #iters: 100

weights:
  w_repulsion: 1.0
  obs_margin: 0.5
  

