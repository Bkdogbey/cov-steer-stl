label: "Narrow Gap"
dynamics: configs/dynamics/double_integrator.yaml

horizon: 30

initial_state:
  mean: [0.0, 0.0, 1.0, 0.0]
  cov_diag: [0.05, 0.05, 0.01, 0.01]

goal:
  x_range: [8.0, 10.0]
  y_range: [-1.0, 1.0]

bounds:
  x_range: [-1.0, 11.0]
  y_range: [-4.0, 4.0]

obstacles:
  - type: rectangle
    x_range: [2, 4]
    y_range: [-1.0, 4.0]
  - type: rectangle
    x_range: [5.0, 7.0]
    y_range: [-4.0, -1.0]
  - type: rectangle
    x_range: [5.0, 7.0]
    y_range: [1.0, 4.0]


planner:
  type: single_shot
  steering: closed_loop        # or "open_loop" for baseline

# Override defaults for this scenario
optimizer:
  max_iters: 500
  lr_v: 0.05
  lr_k: 0.005

weights:
  w_repulsion: 0.8
  obs_margin: 0.4    # smaller margin so planner can still thread the gap
