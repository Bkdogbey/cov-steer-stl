# Double Slit scenario — matches Okamoto et al. 2019 (Fig. 2)
#
# A thin vertical wall at x ∈ [-0.1, 0.1] has two gaps.
# The vehicle starts at x=-2.5 heading right at vx=1.5 m/s, reaching the wall
# after ~8 steps (2.5 / (1.5 * 0.2)), leaving enough time to maneuver in y.
#
# Wall layout:
#   Upper block : y ∈ [1.8,  4.0]
#   Upper gap   : y ∈ [1.0,  1.8]  ← width 0.8  (narrower)
#   Middle block: y ∈ [-1.0, 1.0]  ← vehicle starts here in y → must steer out
#   Lower gap   : y ∈ [-2.0, -1.0] ← width 1.0  (wider)
#   Lower block : y ∈ [-4.0, -2.0]
#
# Expected behaviour:
#   Open-loop: covariance grows → needs wider lower gap
#   Cov-steering: K shrinks σ_y → can fit through narrower upper gap

label: "Double Slit"
dynamics: configs/dynamics/double_integrator.yaml

horizon: 30
animate: true   # produce GIF after run_comparison

initial_state:
  mean: [-3.0,  0.0, 1.5, 0.0]      # px, py, vx, vy
  cov_diag: [0.05, 0.4, 0.01, 0.01] # wide y-uncertainty on purpose

goal:
  x_range: [3.5, 5.5]
  y_range: [0.5, 1.5]

bounds:
  x_range: [-3.5, 6.5]
  y_range: [-4.0, 4.0]

obstacles:
  - type: rectangle
    x_range: [0.0, 1.5]
    y_range: [2.0, 4.0]      # upper block  (above upper gap)
  - type: rectangle
    x_range: [0.0, 1.5]
    y_range: [-1.0, 1.5]     # middle block (separates the two gaps)
  - type: rectangle
    x_range: [0.0, 1.5]
    y_range: [-4.0, -2.0]    # lower block  (below lower gap)

planner:
  type: single_shot
  steering: closed_loop

optimizer:
  max_iters: 1000
  lr_v: 0.03
  lr_k: 0.05
  min_iters: 100

weights:
  w_trace: 0.025
  w_trace_terminal: 0.2
  w_dist: 0.1
  w_u: 0.001
  w_du: 0.5
  w_K: 0.005
  w_repulsion: 0.1
  obs_margin: 0.5
